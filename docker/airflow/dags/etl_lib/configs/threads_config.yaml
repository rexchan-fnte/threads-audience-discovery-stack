# Threads Scraper Pipeline Configuration
# =======================================

# --- 關鍵字設定 ---
keywords:
  # t1：直接包車意圖
  t1_charter:
    - "沖繩包車"
    - "富士山包車"
    - "大阪包車"
    - "北海道包車"
    - "福岡包車"

  # t2：旅遊泛意圖
  t2_travel:
    - "沖繩自由行"
    - "沖繩旅遊"
    - "富士山自由行"
    - "富士山旅遊"
    - "大阪自由行"
    - "大阪旅遊"
    - "北海道自由行"
    - "北海道旅遊"
    - "福岡自由行"
    - "福岡旅遊"

  # t1：機場/景點接送
  t1_transfer:
    - "沖繩機場接送"
    - "成田機場接送"
    - "羽田機場接送"
    - "關西機場接送"
    - "新千歲機場接送"
    - "福岡機場接送"
    - "環球影城接送"

# --- 商家文篩選詞 ---
commercial_terms:
  - "LINE ID"
  - "歡迎諮詢"
  - "招募"
  - "互追"
  - "漲粉"
  - "立即預訂"
  - "車隊"
  - "限時"
  - "超時費"
  - "客製"
  - "經營"
  - "急單"
  - "服務品質"
  - "客人"
  - "提前預約"
  - "免費幫忙"
  - "免費協助"
  - "為您"
  - "領取"
  - "公司"
  - "留言"
  - "傳給你"

# --- 意圖分類 ---
transform:
  charter_regex: "包車|租車|司機|接送"

# --- 爬蟲設定 ---
scraper:
  min_rounds: 2
  max_rounds: 5
  dup_threshold: 0.7

# --- BigQuery ---
bigquery:
  project_id: "dasp04"
  dataset_id: "social_media"
  table_id: "threads_posts"

# --- Google Sheets ---
gsheets:
  sheet_id: "1Jk9YRIQ6nFWGIh2fHJxEbaRWSpCCOxnSXumuoysmbdQ"
  worksheet_name: "raw_posts"
  creds_path: "/opt/airflow/config/gsheets-key.json"
  columns:
    - "username"
    - "post_date"
    - "text"
    - "permalink"
    - "search_keyword"
    - "audience_type"
    - "scrape_date"

# --- LLM ---
llm:
  model: "claude-sonnet-4-20250514"
  batch_size: 8
  max_tokens: 4096

# --- 通知 ---
notification:
  email_to: "rex.chan@fnte.com.tw"
